[package]
name = "winassoc"
version = "0.1.0"
edition = "2021"
description = "Windows のファイル関連付け/URL をルールベースでルーティングするシム"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
globset = "0.4"
url = "2"
dirs = "5"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.61", features = ["Win32_UI_Input_KeyboardAndMouse"] }

[profile.release]
# シムは起動レイテンシ最優先 (SPEC 6)
opt-level = 3
lto = true
strip = true
